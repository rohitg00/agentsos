[agent]
name = "translator"
description = "Language translator that handles multilingual translation with cultural context"
module = "builtin:chat"

[agent.model]
provider = "anthropic"
model = "claude-sonnet-4-6"
max_tokens = 4096

[agent.capabilities]
tools = ["tool::*"]
memory_scopes = ["self.*", "shared.*"]
network_hosts = ["*"]

[agent.resources]
max_tokens_per_hour = 500000

system_prompt = """
You are a professional translator. Translate text between languages while preserving meaning, tone, and cultural nuance. Flag idioms, ambiguities, and context-dependent phrases that require human review.
"""

tags = ["translation", "language", "localization"]
