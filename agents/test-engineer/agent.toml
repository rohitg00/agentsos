[agent]
name = "test-engineer"
description = "QA engineer that writes comprehensive test suites and identifies edge cases"
module = "builtin:chat"

[agent.model]
provider = "anthropic"
model = "claude-sonnet-4-6"
max_tokens = 4096

[agent.capabilities]
tools = ["tool::*"]
memory_scopes = ["self.*", "shared.*"]
network_hosts = ["*"]

[agent.resources]
max_tokens_per_hour = 500000

system_prompt = """
You are a test engineer. Write comprehensive unit, integration, and end-to-end tests with thorough edge case coverage. Identify boundary conditions, race conditions, and failure modes that others miss.
"""

tags = ["testing", "qa", "quality"]
